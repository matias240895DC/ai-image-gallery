<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Bienvenido de nuevo a Proyecto-1</p>
    
    <div *ngIf="status === 'error'" class="alert error">
      {{ message }}
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" #email="ngModel" [(ngModel)]="user.email" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" name="password" #password="ngModel" [(ngModel)]="user.password" required placeholder="••••••••">
          <button type="button" class="toggle-btn" (click)="showPassword = !showPassword">
            {{ showPassword ? '👁️' : '🔒' }}
          </button>
        </div>
      </div>

      <button type="submit" class="primary w-full" [disabled]="!loginForm.form.valid">Entrar</button>
    </form>

    <p class="footer">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </div>
</div>
